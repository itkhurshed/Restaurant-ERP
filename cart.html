    <div class="collapse navbar-collapse" id="navContent">

        <li class="nav-item"><a class="nav-link" href="reservation.html">Reservations</a></li>
        <li class="nav-item"><a class="nav-link" href="track-order.html">Track Order</a></li>
      </ul>
      <ul class="navbar-nav align-items-lg-center">
        <li class="nav-item">

<div class="container py-4">
  <h2 class="mb-3">Your Cart</h2>
  <div id="cartItems"></div>
  <div id="cartTotals" class="mt-3"></div>
  <a href="menu.html" class="btn btn-outline-dark mt-3">Add More Items</a>
  <a href="checkout.html" class="btn btn-dark mt-3" id="toCheckoutBtn">Proceed to Checkout</a>

<footer>
  &copy; 2026 ProServe Restaurant. All rights reserved. &middot;

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/cart.js"></script>
<script src="js/auth.js"></script>
<script>
function renderCartPage() {
  const cart = getCart();
  const box = document.getElementById("cartItems");
  const toCheckout = document.getElementById("toCheckoutBtn");
  if (!cart.length) {
    box.innerHTML = '<p class="text-muted">Your cart is empty. <a href="menu.html">Browse the menu</a>.</p>';
    toCheckout.classList.add("disabled");
    document.getElementById("cartTotals").innerHTML = "";
    return;
  }
  box.innerHTML = cart.map((item, idx) => `
    <div class="cart-line d-flex justify-content-between align-items-center">
      <div>
        <div class="fw-semibold">${item.name}</div>
        <small class="text-muted">${[item.size, item.spiceLevel, (item.toppings||[]).map(t=>t.name).join(", ")].filter(Boolean).join(" \u00b7 ")}</small>
        ${item.notes ? `<div class="small fst-italic">"${item.notes}"</div>` : ""}
      </div>
      <div class="d-flex align-items-center gap-2">
        <input type="number" min="1" value="${item.qty}" class="form-control form-control-sm" style="width:70px" onchange="updateCartQty(${idx}, parseInt(this.value)); renderCartPage();">
        <span>${formatMoney(cartLineTotal(item))}</span>
        <button class="btn btn-sm btn-outline-danger" onclick="removeFromCart(${idx}); renderCartPage();">Remove</button>
      </div>
    </div>
  `).join("");
  toCheckout.classList.remove("disabled");
  document.getElementById("cartTotals").innerHTML = `<div class="fs-5 fw-bold text-end">Subtotal: ${formatMoney(cartSubtotal())}</div>`;
}
document.addEventListener("DOMContentLoaded", renderCartPage);
</script>
</body>
</html>
