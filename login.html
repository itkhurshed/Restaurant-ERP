<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — ProServe</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>




<div class="container py-5" style="max-width:420px;">
  <div id="loginPanel">
    <h3 class="mb-3">Log In</h3>
    <div id="loginMsg"></div>
    <form id="loginForm">
      <label class="form-label">Email</label>
      <input type="email" id="loginEmail" class="form-control mb-3" required>
      <label class="form-label">Password</label>
      <input type="password" id="loginPassword" class="form-control mb-3" required>
      <button type="submit" class="btn btn-dark w-100">Log In</button>
    </form>
    <p class="mt-3 text-center">New here? <button class="btn btn-link p-0" id="showSignupBtn">Create an account</button></p>
  </div>

  <div id="signupPanel" class="d-none">
    <h3 class="mb-3">Create Account</h3>
    <div id="signupMsg"></div>
    <form id="signupForm">
      <label class="form-label">Full Name</label>
      <input type="text" id="signupName" class="form-control mb-3" required>
      <label class="form-label">Phone</label>
      <input type="text" id="signupPhone" class="form-control mb-3" required>
      <label class="form-label">Email</label>
      <input type="email" id="signupEmail" class="form-control mb-3" required>
      <label class="form-label">Password</label>
      <input type="password" id="signupPassword" class="form-control mb-3" required minlength="6">
      <button type="submit" class="btn btn-dark w-100">Create Account</button>
    </form>
    <p class="mt-3 text-center">Already have an account? <button class="btn btn-link p-0" id="showLoginBtn">Log in</button></p>
  </div>
</div>




<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/cart.js"></script>
<script src="js/auth.js"></script>
<script src="js/login-page.js"></script>
</body>
</html>
