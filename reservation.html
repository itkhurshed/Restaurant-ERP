<div class="container py-4">
  <h2 class="mb-3">Book a Table</h2>
  <div id="reservationMsg"></div>
  <form id="reservationForm" class="row g-3">
    <div class="col-md-6"><label class="form-label">Name</label><input type="text" id="resName" class="form-control" required></div>
    <div class="col-md-6"><label class="form-label">Phone</label><input type="text" id="resPhone" class="form-control" required></div>
    <div class="col-md-4"><label class="form-label">Date</label><input type="date" id="resDate" class="form-control" required></div>
    <div class="col-md-4"><label class="form-label">Time</label><input type="time" id="resTime" class="form-control" required></div>
    <div class="col-md-4"><label class="form-label">Guests</label><input type="number" id="resGuests" class="form-control" min="1" value="2" required></div>
    <div class="col-md-6">
      <label class="form-label">Seating</label>
      <select id="resSeating" class="form-select">
        <option>Indoor</option>
        <option>Outdoor</option>
        <option>Family Section</option>
      </select>
    </div>
    <div class="col-md-6 d-flex align-items-end">
      <div class="form-check">
        <input type="checkbox" id="resVip" class="form-check-input">
        <label class="form-check-label" for="resVip">Request VIP room</label>
      </div>
    </div>
    <div class="col-md-6"><label class="form-label">Special Occasion</label><input type="text" id="resOccasion" class="form-control" placeholder="Birthday, anniversary..."></div>
    <div class="col-md-12"><label class="form-label">Special Request</label><textarea id="resRequest" class="form-control" rows="2"></textarea></div>
    <div class="col-12">
      <button type="submit" id="reservationSubmitBtn" class="btn btn-dark btn-lg">Request Reservation</button>
    </div>
  </form>
</div>
